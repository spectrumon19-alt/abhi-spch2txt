<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Live Speech Transcriber</title>
<style>
  :root {
    --bg: #0f172a;
    --panel: #111827;
    --text: #e5e7eb;
    --muted: #94a3b8;
    --accent: #22c55e;
    --accent-dim: rgba(34, 197, 94, 0.25);
    --danger: #ef4444;
    --warn: #f59e0b;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    background: linear-gradient(135deg, #0b1020, #0f172a 55%, #0b1020);
    color: var(--text);
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 24px;
  }
  .dashboard {
    width: min(1000px, 100%);
    background: var(--panel);
    border: 1px solid #1f2937;
    border-radius: 16px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.45);
    padding: 20px;
    display: grid;
    gap: 16px;
  }
  header {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  h1 {
    margin: 0;
    font-size: 1.35rem;
    letter-spacing: 0.2px;
  }
  .status {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 0.95rem;
    color: var(--muted);
  }
  .mic {
    position: relative;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: var(--muted);
  }
  .mic.active {
    background: var(--accent);
    box-shadow: 0 0 0 0 var(--accent-dim);
    animation: pulse 1.4s infinite;
  }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 var(--accent-dim); }
    70% { box-shadow: 0 0 0 12px rgba(34,197,94,0); }
    100% { box-shadow: 0 0 0 0 rgba(34,197,94,0); }
  }
  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }
  button {
    appearance: none;
    border: 1px solid #243046;
    background: #0b1220;
    color: var(--text);
    padding: 10px 14px;
    border-radius: 10px;
    font-weight: 600;
    cursor: pointer;
  }
  button:hover { border-color: #334155; }
  button:disabled {
    opacity: 0.55;
    cursor: not-allowed;
  }
  .primary {
    background: #12243a;
    border-color: #1f3b5c;
  }
  .danger {
    border-color: #3f1d1d;
    background: #1a0f12;
    color: #fecaca;
  }
  .transcript {
    background: #0b1220;
    border: 1px solid #1f2a3a;
    border-radius: 12px;
    padding: 16px;
    height: 360px;
    overflow-y: auto;
    line-height: 1.5;
    font-size: 1.02rem;
  }
  .final { color: var(--text); }
  .interim { color: var(--muted); }
  .alerts {
    display: grid;
    gap: 8px;
  }
  .alert {
    padding: 10px 12px;
    border-radius: 10px;
    border: 1px solid;
    font-size: 0.95rem;
  }
  .alert.warn { border-color: #3f2a13; background: #1b1308; color: #facc15; }
  .alert.danger { border-color: #3f1d1d; background: #1a0f12; color: #fecaca; }
  .footer-note {
    color: var(--muted);
    font-size: 0.9rem;
  }
</style>
</head>
<body>
  <div class="dashboard" role="application" aria-label="Live speech transcriber">
    <header>
      <h1>Live Speech Transcriber</h1>
      <div class="status" aria-live="polite">
        <span class="mic" id="micIndicator" aria-hidden="true"></span>
        <span id="statusText">Idle</span>
      </div>
    </header>

    <div class="controls" role="toolbar" aria-label="Transcription controls">
      <button id="startBtn" class="primary">Start</button>
      <button id="stopBtn" class="danger" disabled>Stop</button>
      <button id="downloadBtn" disabled>Download (.txt)</button>
      <button id="clearBtn">Clear</button>
    </div>

    <div id="alerts" class="alerts" aria-live="assertive"></div>

    <div id="transcript" class="transcript" tabindex="0" aria-label="Transcript area">
      <span class="final" id="finalText"></span>
      <span class="interim" id="interimText"></span>
    </div>

    <div class="footer-note">
      Tip: Keep this tab active for the most reliable recognition. (Yes, browsers can be drama queens.)
    </div>
  </div>

<script>
(() => {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  const startBtn = document.getElementById('startBtn');
  const stopBtn = document.getElementById('stopBtn');
  const downloadBtn = document.getElementById('downloadBtn');
  const clearBtn = document.getElementById('clearBtn');
  const finalEl = document.getElementById('finalText');
  const interimEl = document.getElementById('interimText');
  const transcriptEl = document.getElementById('transcript');
  const micIndicator = document.getElementById('micIndicator');
  const statusText = document.getElementById('statusText');
  const alertsEl = document.getElementById('alerts');

  let recognition = null;
  let isUserStopped = true;
  let finalTranscript = '';
  let noSpeechTimeoutId = null;

  const addAlert = (type, message) => {
    const div = document.createElement('div');
    div.className = `alert ${type}`;
    div.textContent = message;
    alertsEl.appendChild(div);
  };

  const clearAlerts = () => { alertsEl.innerHTML = ''; };

  const setStatus = (text, active) => {
    statusText.textContent = text;
    micIndicator.classList.toggle('active', !!active);
  };

  const autoScroll = () => {
    transcriptEl.scrollTop = transcriptEl.scrollHeight;
  };

  const scheduleNoSpeechWarning = () => {
    clearTimeout(noSpeechTimeoutId);
    noSpeechTimeoutId = setTimeout(() => {
      addAlert('warn', 'No speech detected for a while. If you are talking, try speaking closer to the mic or check permissions.');
    }, 20000);
  };

  const initRecognition = () => {
    if (!SpeechRecognition) {
      addAlert('danger', 'This browser does not support the Web Speech API. Please use Chrome, Edge, or Safari.');
      startBtn.disabled = true;
      return;
    }

    recognition = new SpeechRecognition();
    recognition.continuous = true;
    recognition.interimResults = true;
    recognition.lang = 'en-US';

    recognition.onstart = () => {
      setStatus('Listening…', true);
      scheduleNoSpeechWarning();
    };

    recognition.onresult = (event) => {
      scheduleNoSpeechWarning();
      let interim = '';
      for (let i = event.resultIndex; i < event.results.length; i++) {
        const res = event.results[i];
        if (res.isFinal) {
          finalTranscript += res[0].transcript;
        } else {
          interim += res[0].transcript;
        }
      }
      finalEl.textContent = finalTranscript;
      interimEl.textContent = interim ? ` ${interim}` : '';
      downloadBtn.disabled = finalTranscript.trim().length === 0;
      autoScroll();
    };

    recognition.onerror = (event) => {
      const err = event.error;
      if (err === 'not-allowed' || err === 'service-not-allowed') {
        addAlert('danger', 'Microphone permission denied. Please allow mic access and try again.');
        isUserStopped = true;
        stopRecognition();
      } else if (err === 'no-speech') {
        addAlert('warn', 'No speech detected. The mic is on, but it cannot hear you.');
      } else if (err === 'audio-capture') {
        addAlert('danger', 'No microphone was found. Please connect a mic and retry.');
        isUserStopped = true;
        stopRecognition();
      } else {
        addAlert('warn', `Speech recognition error: ${err}`);
      }
    };

    recognition.onend = () => {
      setStatus(isUserStopped ? 'Stopped' : 'Reconnecting…', false);
      clearTimeout(noSpeechTimeoutId);
      if (!isUserStopped) {
        try { recognition.start(); } catch (_) {}
      }
    };
  };

  const startRecognition = () => {
    clearAlerts();
    if (!recognition) initRecognition();
    if (!recognition) return;

    isUserStopped = false;
    try {
      recognition.start();
      startBtn.disabled = true;
      stopBtn.disabled = false;
    } catch (_) {
      // start can throw if called too quickly
    }
  };

  const stopRecognition = () => {
    if (!recognition) return;
    isUserStopped = true;
    recognition.stop();
    startBtn.disabled = false;
    stopBtn.disabled = true;
    setStatus('Stopped', false);
    clearTimeout(noSpeechTimeoutId);
  };

  const downloadTranscript = () => {
    const content = finalTranscript.trim();
    if (!content) return;

    const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
    const url = URL.createObjectURL(blob);

    const now = new Date();
    const stamp = now.toISOString().replace(/[:.]/g, '-');
    const filename = `transcript-${stamp}.txt`;

    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  };

  const clearTranscript = () => {
    finalTranscript = '';
    finalEl.textContent = '';
    interimEl.textContent = '';
    downloadBtn.disabled = true;
    autoScroll();
  };

  startBtn.addEventListener('click', startRecognition);
  stopBtn.addEventListener('click', stopRecognition);
  downloadBtn.addEventListener('click', downloadTranscript);
  clearBtn.addEventListener('click', clearTranscript);

  // Initialize compatibility check on load
  initRecognition();
  setStatus('Idle', false);
})();
</script>
</body>
</html>

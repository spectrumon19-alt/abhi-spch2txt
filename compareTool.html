<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Abhi Text Compare App</title>
  
  <!-- Libraries -->
  <script src="https://cdn.jsdelivr.net/npm/diff@5.2.0/dist/diff.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/diff2html/bundles/js/diff2html.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/diff2html/bundles/css/diff2html.min.css" />
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-900">
  <div class="container mx-auto p-6">
    <h1 class="text-3xl font-bold mb-6 text-center">Abhi Text Comparison Tool</h1>
    
    <!-- Input panels -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
      <textarea id="text1" class="w-full h-72 p-3 border rounded-lg shadow-sm focus:ring focus:ring-blue-400" placeholder="Enter or paste first text..."></textarea>
      <textarea id="text2" class="w-full h-72 p-3 border rounded-lg shadow-sm focus:ring focus:ring-blue-400" placeholder="Enter or paste second text..."></textarea>
    </div>

    <!-- Toolbar buttons -->
    <div class="flex flex-wrap justify-center gap-3 mb-6">
      <button id="compareBtn" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-lg shadow">Compare</button>
      <button id="swapBtn" class="bg-yellow-500 hover:bg-yellow-600 text-white px-5 py-2 rounded-lg shadow">Swap</button>
      <button id="clearBtn" class="bg-red-600 hover:bg-red-700 text-white px-5 py-2 rounded-lg shadow">Clear</button>
      <button id="downloadBtn" class="bg-green-600 hover:bg-green-700 text-white px-5 py-2 rounded-lg shadow">Download Diff</button>
      <button id="copyBtn" class="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2 rounded-lg shadow">Copy Result</button>
    </div>

    <!-- Diff Output -->
    <div id="diffOutput" class="bg-white shadow-lg rounded-lg p-4 overflow-auto max-h-[500px]"></div>
  </div>

  <script>
    const text1 = document.getElementById('text1');
    const text2 = document.getElementById('text2');
    const diffOutput = document.getElementById('diffOutput');

    // Generate and render diff
    function generateDiff() {
      const diff = Diff.createTwoFilesPatch('Text1', 'Text2', text1.value, text2.value);
      const diffHtml = Diff2Html.html(diff, { drawFileList: false, matching: 'lines', outputFormat: 'side-by-side' });
      diffOutput.innerHTML = diffHtml;
    }

    // Event Listeners
    document.getElementById('compareBtn').addEventListener('click', generateDiff);

    document.getElementById('swapBtn').addEventListener('click', () => {
      [text1.value, text2.value] = [text2.value, text1.value];
    });

    document.getElementById('clearBtn').addEventListener('click', () => {
      text1.value = '';
      text2.value = '';
      diffOutput.innerHTML = '';
    });

    document.getElementById('downloadBtn').addEventListener('click', () => {
      const blob = new Blob([diffOutput.innerText], { type: 'text/plain' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'diff.txt';
      a.click();
      URL.revokeObjectURL(url);
    });

    document.getElementById('copyBtn').addEventListener('click', () => {
      navigator.clipboard.writeText(diffOutput.innerText);
      alert(' Diff copied to clipboard!');
    });
  </script>
</body>
</html>
